<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 &ndash; MSCon</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,200;1,9..144,300&family=DM+Sans:wght@200;300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#070707;--gold:#E8A030;--text:#f0ece4;--dim:#3a3530;--dim2:#5a5248;--border:rgba(255,255,255,.06);}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;display:flex;flex-direction:column;}

main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;}

.code{font-family:'Fraunces',Georgia,serif;font-size:clamp(5rem,20vw,10rem);font-weight:700;color:var(--gold);line-height:1;opacity:.9;}
.label{font-family:'JetBrains Mono',monospace;font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dim2);margin-top:12px;margin-bottom:32px;}
.msg{color:rgba(240,236,228,.6);font-size:1rem;margin-bottom:40px;}

.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border:1px solid rgba(232,160,48,.35);color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;border-radius:4px;transition:background .2s,border-color .2s;}
.btn:hover{background:rgba(232,160,48,.08);border-color:rgba(232,160,48,.6);text-decoration:none;}

footer{padding:24px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:12px;justify-content:center;align-items:center;font-size:.78rem;color:var(--dim2);}
footer a{color:var(--dim2);text-decoration:none;}
footer a:hover{color:var(--gold);}
</style>
</head>
<body>
<main>
  <div class="code">404</div>
  <p class="label">Seite nicht gefunden</p>
  <p class="msg">Die aufgerufene Seite existiert nicht oder wurde verschoben.</p>
  <a class="btn" href="/">&#8592; Zur Startseite</a>
</main>
<footer>
  <span>&copy; 2026 MSCon &middot; IT-Architektur &amp; Digitale Transformation</span>
  <span><a href="impressum.html">Impressum</a> &nbsp;&middot;&nbsp; <a href="datenschutz.html">Datenschutz</a></span>
</footer>
</body>
</html>
