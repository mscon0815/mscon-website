<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MSCon — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,200&family=DM+Sans:wght@200;300;400&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#070707;--gold:#E8A030;--red:#9B2335;--olive:#7A8C3A;--text:rgba(240,236,228,.92);--dim:rgba(240,236,228,.22);--dim2:rgba(240,236,228,.42);}
html,body{height:100%;background:var(--bg);overflow:hidden;}
canvas{position:fixed;inset:0;z-index:0;}
#fog{position:fixed;inset:0;z-index:2;pointer-events:none;}

#ui{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;padding:1rem;}

.ring{width:clamp(160px,40vw,220px);height:clamp(160px,40vw,220px);position:relative;display:flex;align-items:center;justify-content:center;margin-bottom:clamp(1.5rem,4vw,2.8rem);}
.ring svg{position:absolute;inset:0;width:100%;height:100%;animation:spin 12s linear infinite;}
.ring-track{fill:none;stroke:rgba(232,160,48,.08);stroke-width:1;}
.ring-progress{fill:none;stroke:var(--gold);stroke-width:.8;stroke-linecap:round;stroke-dasharray:502;stroke-dashoffset:502;animation:fill-ring 3.5s cubic-bezier(.4,0,.2,1) forwards 1.2s;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes fill-ring{to{stroke-dashoffset:100;}}

/* 3D orbiting dot */
.orbit-dot{position:absolute;top:50%;left:50%;width:7px;height:7px;border-radius:50%;background:var(--gold);z-index:3;animation:orbit3d 12s linear infinite,orbit-color 18s ease-in-out infinite;}
@keyframes orbit-color{
  0%,100%{background:var(--gold);}
  33%    {background:#9B2335;}
  66%    {background:#7A8C3A;}
}
@keyframes orbit3d{
  0%  {transform:translate(calc(-50% + 0px),   calc(-50% - 40px)) scale(1.35);opacity:1;  box-shadow:0 0 10px 3px rgba(232,160,48,.9);}
  25% {transform:translate(calc(-50% + 104px), calc(-50% + 0px))  scale(0.88);opacity:.68;box-shadow:0 0 6px 1px rgba(232,160,48,.5);}
  50% {transform:translate(calc(-50% + 0px),   calc(-50% + 40px)) scale(0.45);opacity:.18;box-shadow:0 0 3px 0px rgba(232,160,48,.2);}
  75% {transform:translate(calc(-50% - 104px), calc(-50% + 0px))  scale(0.88);opacity:.68;box-shadow:0 0 6px 1px rgba(232,160,48,.5);}
  100%{transform:translate(calc(-50% + 0px),   calc(-50% - 40px)) scale(1.35);opacity:1;  box-shadow:0 0 10px 3px rgba(232,160,48,.9);}
}

#logo-outer{display:flex;align-items:center;justify-content:center;}
@keyframes mega-pulse{
  0%  {filter:none;                                               transform:none;}
  4%  {filter:brightness(6) contrast(2) saturate(0);             transform:translate(-5px,-1px) skewX(-3deg);}
  8%  {filter:none;                                               transform:none;}
  15% {filter:brightness(5) contrast(1.8) hue-rotate(18deg);     transform:translate(5px,1px) skewX(2.5deg);}
  19% {filter:brightness(.25);                                    transform:translate(-3px,0) skewX(1deg);}
  25% {filter:brightness(4.8) hue-rotate(-14deg) contrast(1.6);  transform:translate(3px,-2px);}
  30% {filter:none;                                               transform:translate(-2px,1px);}
  34% {filter:brightness(3.5);                                    transform:none;}
  38% {filter:none;                                               transform:none;}
  50% {filter:brightness(1.6) drop-shadow(0 0 8px rgba(232,160,48,.7));transform:none;}
  100%{filter:none;                                               transform:none;}
}
#logo-outer.mega{animation:mega-pulse .42s linear forwards;}
.logo-wrap{position:relative;width:clamp(70px,18vw,100px);height:clamp(70px,18vw,100px);animation:glitch-anim 4s infinite, fadein 1s ease forwards .8s;opacity:0;}
.logo-wrap img{width:100%;height:100%;object-fit:contain;filter:invert(1);display:block;}
.logo-wrap::before,.logo-wrap::after{content:'';position:absolute;inset:0;background:url('assets/logo.png') center/contain no-repeat;filter:invert(1);}
.logo-wrap::before{clip-path:polygon(0 0,100% 0,100% 35%,0 35%);animation:glitch-1 4s infinite;opacity:.7;}
.logo-wrap::after{clip-path:polygon(0 60%,100% 60%,100% 100%,0 100%);animation:glitch-2 4s infinite;opacity:.7;}
@keyframes glitch-anim{0%,90%,100%{transform:none;}92%{transform:skewX(-1deg);}94%{transform:skewX(1.5deg);}96%{transform:skewX(-.5deg);}}
@keyframes glitch-1{0%,89%,100%{transform:none;opacity:0;}90%{transform:translate(-3px,1px);opacity:.7;}93%{transform:translate(2px,-1px);opacity:.5;}96%{transform:translate(-1px,2px);opacity:.3;}98%{transform:none;opacity:0;}}
@keyframes glitch-2{0%,91%,100%{transform:none;opacity:0;}92%{transform:translate(2px,-2px);opacity:.6;}95%{transform:translate(-2px,1px);opacity:.4;}97%{transform:translate(1px,0);opacity:.2;}99%{transform:none;opacity:0;}}

#tagline{font-family:'DM Sans',sans-serif;font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;color:var(--dim2);margin-top:1rem;text-align:center;opacity:0;animation:fadein 1s ease forwards 1.8s;transition:opacity .3s;}
#status{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.1em;color:var(--gold);margin-top:2.5rem;text-align:center;opacity:0;animation:fadein 1s ease forwards 2.4s;}
.dots{display:inline-block;}

#contact{position:fixed;bottom:2.5rem;left:0;right:0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.14em;color:var(--dim);z-index:10;opacity:0;animation:fadein 1s ease forwards 3.2s;}
#contact a{color:var(--dim);text-decoration:none;transition:color .2s;}
#contact a:hover{color:var(--gold);}

#lang-toggle{position:fixed;top:2rem;right:2rem;z-index:20;display:flex;align-items:center;gap:.4rem;opacity:0;animation:fadein 1s ease forwards 3s;pointer-events:all;}
#lang-toggle button{background:transparent;border:none;font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.12em;color:var(--dim);cursor:pointer;padding:0;transition:color .2s;}
#lang-toggle button.active{color:var(--gold);}
#lang-toggle button:hover:not(.active){color:var(--dim2);}
.lang-sep{font-size:.58rem;color:var(--dim);letter-spacing:0;}

@keyframes fadein{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>

<canvas id="gc"></canvas>
<div id="fog"></div>

<div id="ui">
  <div class="ring">
    <svg viewBox="0 0 170 170">
      <circle class="ring-track" cx="85" cy="85" r="80"/>
      <circle class="ring-progress" cx="85" cy="85" r="80"/>
    </svg>
    <div class="orbit-dot"></div>
    <div id="logo-outer">
      <div class="logo-wrap"><img src="assets/logo.png" alt="MSCon"></div>
    </div>
  </div>
  <div id="tagline"></div>
  <div id="status"><span id="status-text"></span> <span class="dots"></span></div>
</div>

<div id="contact">
  <a href="mailto:schultes@mscon.one">schultes@mscon.one</a>
  &nbsp;&middot;&nbsp; <span id="contact-remote"></span>
</div>

<div id="lang-toggle">
  <button id="btn-de" class="active" onclick="setLang('de')">DE</button>
  <span class="lang-sep">/</span>
  <button id="btn-en" onclick="setLang('en')">EN</button>
</div>

<script>
var i18n = {
  de: {
    tagline: 'IT-Architektur &middot; Digitale Transformation',
    status:  'System wird vorbereitet',
    remote:  'Remote &amp; vor Ort'
  },
  en: {
    tagline: 'IT Architecture &middot; Digital Transformation',
    status:  'System is being prepared',
    remote:  'Remote &amp; on-site'
  }
};

var currentLang = 'de';

function setLang(lang) {
  if (lang === currentLang) return;
  currentLang = lang;
  document.getElementById('tagline').innerHTML         = i18n[lang].tagline;
  document.getElementById('status-text').textContent   = i18n[lang].status;
  document.getElementById('contact-remote').innerHTML  = i18n[lang].remote;
  document.getElementById('btn-de').classList.toggle('active', lang === 'de');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
}

// init
document.getElementById('tagline').innerHTML         = i18n.de.tagline;
document.getElementById('status-text').textContent   = i18n.de.status;
document.getElementById('contact-remote').innerHTML  = i18n.de.remote;

// -- THREE.JS GALAXY --
(function() {
  var canvas = document.getElementById('gc');
  var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.setClearColor(0x070707, 1);
  var scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x070707, 0.006);
  var cam = new THREE.PerspectiveCamera(65, innerWidth / innerHeight, 0.1, 300);
  cam.position.z = 55;

  var N = 2200, sg = new THREE.BufferGeometry();
  var sp = new Float32Array(N*3), sc = new Float32Array(N*3);
  var pal = [[.91,.627,.188],[.608,.137,.208],[.478,.549,.227],[.94,.925,.894],[.94,.925,.894],[.94,.925,.894]];
  for (var i = 0; i < N; i++) {
    var th = Math.random()*Math.PI*2, ph = Math.acos(Math.random()*2-1), r = 50+Math.random()*120;
    sp[i*3]=r*Math.sin(ph)*Math.cos(th); sp[i*3+1]=r*Math.sin(ph)*Math.sin(th); sp[i*3+2]=r*Math.cos(ph);
    var c = pal[Math.floor(Math.random()*pal.length)], b = .3+Math.random()*.7;
    sc[i*3]=c[0]*b; sc[i*3+1]=c[1]*b; sc[i*3+2]=c[2]*b;
  }
  sg.setAttribute('position', new THREE.BufferAttribute(sp, 3));
  sg.setAttribute('color', new THREE.BufferAttribute(sc, 3));
  scene.add(new THREE.Points(sg, new THREE.PointsMaterial({size:.18,vertexColors:true,transparent:true,opacity:.75})));

  var M = 180, mg = new THREE.BufferGeometry();
  var mp = new Float32Array(M*3), mc = new Float32Array(M*3);
  var mpal = [[.91,.627,.188],[.608,.137,.208],[.478,.549,.227],[.94,.925,.894]];
  var pts = [];
  for (var i = 0; i < M; i++) {
    var x=(Math.random()-.5)*80, y=(Math.random()-.5)*50, z=(Math.random()-.5)*60;
    mp[i*3]=x; mp[i*3+1]=y; mp[i*3+2]=z;
    pts.push(new THREE.Vector3(x,y,z));
    var c = mpal[Math.floor(Math.random()*mpal.length)];
    mc[i*3]=c[0]; mc[i*3+1]=c[1]; mc[i*3+2]=c[2];
  }
  mg.setAttribute('position', new THREE.BufferAttribute(mp, 3));
  mg.setAttribute('color', new THREE.BufferAttribute(mc, 3));
  var mesh = new THREE.Points(mg, new THREE.PointsMaterial({size:.28,vertexColors:true,transparent:true,opacity:.85}));
  scene.add(mesh);

  var lv = [], lc = [];
  for (var i = 0; i < M; i++) for (var j = i+1; j < M; j++) {
    var d = pts[i].distanceTo(pts[j]);
    if (d < 18) { var f=1-d/18; lv.push(pts[i].x,pts[i].y,pts[i].z,pts[j].x,pts[j].y,pts[j].z); lc.push(.91*f,.627*f,.188*f,.478*f,.549*f,.227*f); }
  }
  var lg = new THREE.BufferGeometry();
  lg.setAttribute('position', new THREE.BufferAttribute(new Float32Array(lv), 3));
  lg.setAttribute('color', new THREE.BufferAttribute(new Float32Array(lc), 3));
  scene.add(new THREE.LineSegments(lg, new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:.22})));

  [[-20,5,-30,0x9B2335,22,.018],[25,-5,-20,0xE8A030,18,.015],[0,15,-40,0x7A8C3A,28,.012]].forEach(function(n) {
    var m = new THREE.Mesh(new THREE.SphereGeometry(n[4],8,8), new THREE.MeshBasicMaterial({color:n[3],transparent:true,opacity:n[5],depthWrite:false}));
    m.position.set(n[0],n[1],n[2]); scene.add(m);
  });

  var mnx = 0, mny = 0;
  document.addEventListener('mousemove', function(e) { mnx=(e.clientX/innerWidth-.5)*2; mny=(e.clientY/innerHeight-.5)*2; });

  var orig = mp.slice(), T = 0;
  function tick() {
    requestAnimationFrame(tick); T += .003;
    scene.rotation.y += (mnx*.08 - scene.rotation.y)*.02;
    scene.rotation.x += (-mny*.04 - scene.rotation.x)*.02;
    scene.rotation.z = Math.sin(T*.2)*.01;
    var pa = mg.attributes.position.array;
    for (var i = 0; i < M; i++) pa[i*3+1] = orig[i*3+1] + Math.sin(T*.8+i*.3)*.25;
    mg.attributes.position.needsUpdate = true;
    renderer.render(scene, cam);
  }
  tick();

  window.addEventListener('resize', function() {
    cam.aspect = innerWidth/innerHeight; cam.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight);
  });
})();

// -- FOG & SHOOTING STARS --
var fog = document.getElementById('fog');
(function() {
  var cursorX = innerWidth/2, cursorY = innerHeight/2;
  document.addEventListener('mousemove', function(e) { cursorX=e.clientX; cursorY=e.clientY; });

  // Star canvas — z:3 (above fog z:2, below ui z:10)
  var sc = document.createElement('canvas');
  sc.style.cssText = 'position:fixed;inset:0;z-index:3;pointer-events:none;';
  document.body.appendChild(sc);
  var ctx = sc.getContext('2d');
  function resize() { sc.width=innerWidth; sc.height=innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  var stars = [];
  var fogX = innerWidth/2, fogY = innerHeight/2, fogR = 60;
  var fogTx = fogX, fogTy = fogY, fogTr = 120;

  function pos(s, t) {
    var dist = s.speed * t;
    var wave = Math.sin(s.wFreq * t * Math.PI * 2) * s.wAmp * Math.min(t * 2.5, 1);
    var cos = Math.cos(s.angle), sin = Math.sin(s.angle);
    return { x: s.ox + cos*dist + (-sin)*wave, y: s.oy + sin*dist + cos*wave };
  }

  var palette = [[232,160,48],[155,35,53],[122,140,58]]; // gold, red, olive

  function baseParams() {
    var edge = Math.floor(Math.random() * 4); // 0=top 1=right 2=bottom 3=left
    var ox, oy, angle, spread = Math.PI/4;
    if      (edge===0){ ox=innerWidth*Math.random();  oy=-5;              angle= Math.PI/2 +(Math.random()-.5)*spread; }
    else if (edge===1){ ox=innerWidth+5;              oy=innerHeight*Math.random(); angle= Math.PI  +(Math.random()-.5)*spread; }
    else if (edge===2){ ox=innerWidth*Math.random();  oy=innerHeight+5;   angle=-Math.PI/2 +(Math.random()-.5)*spread; }
    else              { ox=-5;                        oy=innerHeight*Math.random(); angle=           (Math.random()-.5)*spread; }
    var c = palette[Math.floor(Math.random()*palette.length)];
    return { ox:ox, oy:oy, angle:angle, r:c[0], g:c[1], b:c[2] };
  }

  // Style A — classic streak: straight hot line with gradient tail
  function spawnStreak() {
    var b = baseParams();
    stars.push(Object.assign(b, {
      style:'streak',
      speed: innerWidth * (.72 + Math.random() * .36),
      wAmp: 0, wFreq: 0,
      born: performance.now(), dur: 1.2 + Math.random() * .5, trail: []
    }));
  }

  // Style B — spiral comet: sinusoidal S-curve trail with atmosphere rings
  function spawnSpiral() {
    var b = baseParams();
    stars.push(Object.assign(b, {
      style:'spiral',
      speed: innerWidth * (.68 + Math.random() * .32),
      wAmp: 22 + Math.random() * 28, wFreq: 1.6 + Math.random() * 1.8,
      born: performance.now(), dur: 1.3 + Math.random() * .55, trail: []
    }));
  }

  // 80% streak, 20% spiral
  function spawn() { Math.random() < .8 ? spawnStreak() : spawnSpiral(); }

  function drawCurve(pts, lw, color) {
    if (pts.length < 2) return;
    ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
    for (var i = 1; i < pts.length-1; i++)
      ctx.quadraticCurveTo(pts[i].x, pts[i].y, (pts[i].x+pts[i+1].x)/2, (pts[i].y+pts[i+1].y)/2);
    ctx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
    ctx.strokeStyle=color; ctx.lineWidth=lw; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
  }

  function loop() {
    requestAnimationFrame(loop);
    ctx.clearRect(0, 0, sc.width, sc.height);
    var now = performance.now();
    var hx = null, hy = null;

    stars = stars.filter(function(s) {
      var t = (now - s.born) / 1000;
      if (t > s.dur) return false;
      var fade = Math.sin((t / s.dur) * Math.PI);
      var p = pos(s, t);
      s.trail.push({ x: p.x, y: p.y, t: t });

      var trailWindow = s.style === 'streak' ? 0.55 : 0.45;
      s.trail = s.trail.filter(function(pt) { return t - pt.t < trailWindow; });
      var pts = s.trail;

      var cr = s.r+','+s.g+','+s.b; // color string for rgba()

      if (s.style === 'streak') {
        // — Classic straight streak —
        var tail = pts[0] || p;
        // outer bloom
        ctx.beginPath(); ctx.moveTo(tail.x,tail.y); ctx.lineTo(p.x,p.y);
        ctx.strokeStyle='rgba('+cr+','+(fade*.09)+')'; ctx.lineWidth=10; ctx.lineCap='round'; ctx.stroke();
        // gradient core
        var g = ctx.createLinearGradient(tail.x,tail.y,p.x,p.y);
        g.addColorStop(0,  'rgba('+cr+',0)');
        g.addColorStop(.5, 'rgba('+cr+','+(fade*.30)+')');
        g.addColorStop(.84,'rgba(255,252,230,'+(fade*.78)+')');
        g.addColorStop(1,  'rgba(255,255,248,'+(fade*.95)+')');
        ctx.beginPath(); ctx.moveTo(tail.x,tail.y); ctx.lineTo(p.x,p.y);
        ctx.strokeStyle=g; ctx.lineWidth=1.8; ctx.stroke();
        // hot tip — warm white core + colored halo
        var rt = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,16);
        rt.addColorStop(0,  'rgba(255,253,240,'+(fade*.95)+')');
        rt.addColorStop(.4, 'rgba('+cr+','+(fade*.55)+')');
        rt.addColorStop(1,  'rgba('+cr+',0)');
        ctx.beginPath(); ctx.arc(p.x,p.y,16,0,Math.PI*2); ctx.fillStyle=rt; ctx.fill();

      } else {
        // — Spiral comet —
        drawCurve(pts, 14, 'rgba('+cr+','+(fade*.07)+')');
        drawCurve(pts,  8, 'rgba('+cr+','+(fade*.13)+')');
        drawCurve(pts,  2.5,'rgba(255,248,220,'+(fade*.55)+')');
        drawCurve(pts,  1,  'rgba(255,255,245,'+(fade*.88)+')');
        // concentric atmosphere rings at head
        [[55,.04],[22,.22],[9,.55],[3,.90]].forEach(function(ring) {
          var rr = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,ring[0]);
          var ra = fade * ring[1];
          rr.addColorStop(0,  'rgba(255,252,240,'+ra+')');
          rr.addColorStop(.45,'rgba('+cr+','+(ra*.6)+')');
          rr.addColorStop(1,  'rgba('+cr+',0)');
          ctx.beginPath(); ctx.arc(p.x,p.y,ring[0],0,Math.PI*2); ctx.fillStyle=rr; ctx.fill();
        });
      }

      hx = p.x; hy = p.y;
      return true;
    });

    // Fog: follow star head when active, cursor otherwise
    if (hx !== null) { fogTx=hx; fogTy=hy; fogTr=320; }
    else             { fogTx=cursorX; fogTy=cursorY; fogTr=120; }
    fogX += (fogTx-fogX)*.09; fogY += (fogTy-fogY)*.09; fogR += (fogTr-fogR)*.06;

    fog.style.background =
      'radial-gradient(circle '+fogR.toFixed(1)+'px at '+fogX.toFixed(1)+'px '+fogY.toFixed(1)+'px,'+
      'transparent 0%,rgba(7,7,7,.50) 38%,rgba(7,7,7,.97) 70%,rgba(7,7,7,1) 100%)';
  }
  loop();

  // Glitch sync — glitch fires at 90% of 4 s loop
  // Every 2nd glitch = mega (amplified + 69% chance to spawn star)
  var logo      = document.querySelector('.logo-wrap');
  var logoOuter = document.getElementById('logo-outer');
  var OFFSET    = 4000 * .9;
  var glitchN   = 0;

  function onGlitch() {
    var mega = glitchN % 2 === 1; // 2nd, 4th, 6th… are mega
    glitchN++;
    if (mega) {
      logoOuter.classList.add('mega');
      setTimeout(function(){ logoOuter.classList.remove('mega'); }, 450);
      if (Math.random() < .69) spawn();
    }
  }

  logo.addEventListener('animationstart',     function(e) { if(e.animationName==='glitch-anim'){ glitchN=0; setTimeout(onGlitch, OFFSET); } });
  logo.addEventListener('animationiteration', function(e) { if(e.animationName==='glitch-anim') setTimeout(onGlitch, OFFSET); });
})();

// -- DOTS --
var dots = document.querySelector('.dots');
var d = 0;
setInterval(function() { d = (d+1)%4; dots.textContent = Array(d+1).join('.'); }, 480);
</script>
</body>
</html>
